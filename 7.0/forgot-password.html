<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 智治通社区共治平台</title>
    <!-- 引入公共样式 -->
    <link rel="stylesheet" href="common.css">
    <!-- 引入Font Awesome矢量图标 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== 页面独有基础样式 ==================== */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1a56db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding-top: 0;
        }
        /* ==================== 背景动态装饰 独有样式 ==================== */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 80%, rgba(147, 197, 253, 0.1) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, -2%) rotate(1deg); }
        }
        /* ==================== 返回首页按钮 独有样式 ==================== */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 100;
        }
        .back-btn a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .back-btn a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }
        /* ==================== 忘记密码卡片 独有样式 ==================== */
        .forgot-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 56px 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25),
            0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ==================== Logo区域 独有样式 ==================== */
        .forgot-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: #faf6f6;
            border: 2px solid #1a56db;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26, 86, 219, 0.15);
        }
        .logo svg {
            width: 40px;
            height: 40px;
            fill: none;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 15px;
            color: #6b7280;
            font-weight: 500;
        }
        /* ==================== 验证码组 独有样式 ==================== */
        .code-group {
            display: flex;
            gap: 12px;
        }
        .code-input {
            flex: 1;
        }
        .get-code-btn {
            width: 120px;
            padding: 0 16px;
            background: #1a56db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .get-code-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        /* ==================== 按钮独有样式 ==================== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 86, 219, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 86, 219, 0.4);
        }
        /* ==================== 登录链接 独有样式 ==================== */
        .login-link {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #6b7280;
        }
        .login-link a {
            color: #1a56db;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }
        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #1a56db, #3b82f6);
            transition: width 0.3s;
        }
        .login-link a:hover::after {
            width: 100%;
        }
        /* ==================== 响应式独有适配 ==================== */
        @media (max-width: 640px) {
            .forgot-box {
                padding: 40px 32px;
                border-radius: 20px;
            }
            .back-btn {
                top: 16px;
                left: 16px;
            }
            .back-btn a {
                padding: 8px 16px;
                font-size: 13px;
            }
            .title {
                font-size: 24px;
            }
            .subtitle {
                font-size: 14px;
            }
            .code-group {
                flex-direction: column;
            }
            .get-code-btn {
                width: 100%;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
<div class="bg-decoration"></div>
<div class="back-btn">
    <a href="login.html">
        <i class="fa-solid fa-arrow-left"></i>
        返回登录
    </a>
</div>
<div class="forgot-box">
    <div class="forgot-header">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="#1a56db" stroke-width="2"/>
                <path d="M20 8L28 24H12L20 8Z" fill="#1a56db"/>
                <circle cx="20" cy="20" r="6" fill="#3b82f6"/>
            </svg>
        </div>
        <h1 class="title">重置密码</h1>
        <p class="subtitle">输入注册手机号，获取验证码重置密码</p>
    </div>
    <form id="forgotForm">
        <div class="form-group">
            <label for="phone">注册手机号</label>
            <div class="input-wrapper">
                <input type="tel" id="phone" placeholder="请输入您的注册手机号" maxlength="11" autocomplete="tel">
                <i class="fa-solid fa-mobile-screen"></i>
            </div>
            <div class="error-message" id="phoneError">请输入正确的注册手机号</div>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div class="code-group">
                <div class="input-wrapper code-input">
                    <input type="text" id="code" placeholder="请输入6位验证码" maxlength="6">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <button type="button" class="get-code-btn" onclick="getVerificationCode()">获取验证码</button>
            </div>
            <div class="error-message" id="codeError">验证码错误或已过期</div>
        </div>
        <div class="form-group">
            <label for="newPwd">新密码</label>
            <div class="input-wrapper">
                <input type="password" id="newPwd" placeholder="请设置6-12位新密码" autocomplete="new-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="error-message" id="newPwdError">密码长度应为6-12位</div>
        </div>
        <div class="form-group">
            <label for="confirmNewPwd">确认新密码</label>
            <div class="input-wrapper">
                <input type="password" id="confirmNewPwd" placeholder="请再次输入新密码" autocomplete="new-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="error-message" id="confirmNewPwdError">两次输入的密码不一致</div>
        </div>
        <button type="button" class="btn btn-primary" onclick="resetPassword()">重置密码</button>
    </form>
    <div class="login-link">
        记得密码了？
        <a href="login.html">立即登录</a>
    </div>
</div>
<!-- 引入公共脚本 -->
<script src="common.js"></script>
<!-- 页面独有脚本 -->
<script>
    // 获取验证码
    function getVerificationCode() {
        const phone = document.getElementById('phone').value.trim();
        const getCodeBtn = document.querySelector('.get-code-btn');
        // 验证手机号
        if (!phone) { showError('phone', '请输入手机号'); return; }
        if (!/^1[3-9]\d{9}$/.test(phone)) { showError('phone', '请输入正确的手机号'); return; }
        // 验证手机号是否已注册
        const user = JSON.parse(localStorage.getItem('zhizhitong_user'));
        if (!user || user.phone !== phone) {
            showError('phone', '该手机号未注册');
            return;
        }
        // 生成6位随机验证码
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        // 存储验证码到LocalStorage（有效期5分钟）
        localStorage.setItem('reset_code', code);
        localStorage.setItem('code_expire', Date.now() + 300000);
        // 倒计时60秒
        let countdown = 60;
        getCodeBtn.disabled = true;
        getCodeBtn.textContent = `重新获取(${countdown}s)`;
        const timer = setInterval(() => {
            countdown--;
            getCodeBtn.textContent = `重新获取(${countdown}s)`;
            if (countdown <= 0) {
                clearInterval(timer);
                getCodeBtn.disabled = false;
                getCodeBtn.textContent = '获取验证码';
            }
        }, 1000);
        // 模拟验证码发送成功
        alert(`验证码已发送至您的手机，验证码：${code}（5分钟内有效）`);
    }

    // 重置密码
    function resetPassword() {
        const phone = document.getElementById('phone').value.trim();
        const code = document.getElementById('code').value.trim();
        const newPwd = document.getElementById('newPwd').value.trim();
        const confirmNewPwd = document.getElementById('confirmNewPwd').value.trim();
        // 清除错误提示
        clearErrors();
        // 表单验证
        if (!phone) { showError('phone', '请输入手机号'); return; }
        if (!/^1[3-9]\d{9}$/.test(phone)) { showError('phone', '请输入正确的手机号'); return; }
        if (!code) { showError('code', '请输入验证码'); return; }
        if (code.length !== 6) { showError('code', '验证码为6位数字'); return; }
        if (!newPwd) { showError('newPwd', '请设置新密码'); return; }
        if (newPwd.length < 6 || newPwd.length > 12) { showError('newPwd', '密码长度应为6-12位'); return; }
        if (newPwd !== confirmNewPwd) { showError('confirmNewPwd', '两次输入的密码不一致'); return; }
        // 验证验证码
        const storedCode = localStorage.getItem('reset_code');
        const codeExpire = localStorage.getItem('code_expire');
        if (!storedCode || !codeExpire || Date.now() > codeExpire) {
            showError('code', '验证码已过期，请重新获取');
            return;
        }
        if (storedCode !== code) {
            showError('code', '验证码错误');
            return;
        }
        // 验证手机号已注册
        const user = JSON.parse(localStorage.getItem('zhizhitong_user'));
        if (!user || user.phone !== phone) {
            showError('phone', '该手机号未注册');
            return;
        }
        // 更新密码
        user.pwd = newPwd;
        localStorage.setItem('zhizhitong_user', JSON.stringify(user));
        // 清除验证码
        localStorage.removeItem('reset_code');
        localStorage.removeItem('code_expire');
        alert('密码重置成功！请使用新密码登录');
        window.location.href = 'login.html';
    }
</script>


</body>
</html>
