<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智治通社区共治平台</title>
    <!-- 引入公共样式 -->
    <link rel="stylesheet" href="common.css">
    <!-- 引入Font Awesome矢量图标 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== 页面独有基础样式 ==================== */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1a56db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding-top: 0;
        }
        /* ==================== 背景动态装饰 独有样式 ==================== */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 80%, rgba(147, 197, 253, 0.1) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, -2%) rotate(1deg); }
        }
        /* ==================== 返回首页按钮 独有样式 ==================== */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 100;
        }
        .back-btn a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .back-btn a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }
        /* ==================== 登录卡片 独有样式 ==================== */
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 56px 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25),
            0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ==================== Logo区域 独有样式 ==================== */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: #faf6f6;
            border: 2px solid #1a56db;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26, 86, 219, 0.15);
            animation: logoPulse 2s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .logo svg {
            width: 40px;
            height: 40px;
            fill: none;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 15px;
            color: #6b7280;
            font-weight: 500;
        }
        /* ==================== 表单选项 独有样式 ==================== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1a56db;
        }
        .checkbox-group label {
            font-size: 14px;
            color: #4b5563;
            cursor: pointer;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
            margin-bottom: 0;
        }
        .forgot-password {
            font-size: 14px;
            color: #1a56db;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        .forgot-password:hover {
            color: #1e40af;
            text-decoration: underline;
        }
        /* ==================== 按钮独有样式 ==================== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 86, 219, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 86, 219, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-admin {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            color: #374151;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .btn-admin:hover {
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        /* ==================== 注册链接 独有样式 ==================== */
        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #6b7280;
        }
        .register-link a {
            color: #1a56db;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }
        .register-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #1a56db, #3b82f6);
            transition: width 0.3s;
        }
        .register-link a:hover::after {
            width: 100%;
        }
        /* ==================== 响应式独有适配 ==================== */
        @media (max-width: 640px) {
            .login-box {
                padding: 40px 32px;
                border-radius: 20px;
            }
            .back-btn {
                top: 16px;
                left: 16px;
            }
            .back-btn a {
                padding: 8px 16px;
                font-size: 13px;
            }
            .title {
                font-size: 24px;
            }
            .subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<!-- 背景动态装饰 -->
<div class="bg-decoration"></div>
<!-- 返回首页按钮 -->
<div class="back-btn">
    <a href="index.html">
        <i class="fa-solid fa-arrow-left"></i>
        返回首页
    </a>
</div>
<!-- 登录卡片 -->
<div class="login-box">
    <div class="login-header">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="#1a56db" stroke-width="2"/>
                <path d="M20 8L28 24H12L20 8Z" fill="#1a56db"/>
                <circle cx="20" cy="20" r="6" fill="#3b82f6"/>
            </svg>
        </div>
        <h1 class="title">欢迎回来</h1>
        <p class="subtitle">登录您的智治通账号</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label for="phone">手机号</label>
            <div class="input-wrapper">
                <input type="tel" id="phone" placeholder="请输入您的注册手机号" maxlength="11" autocomplete="tel">
                <i class="fa-solid fa-mobile-screen"></i>
            </div>
            <div class="error-message" id="phoneError">请输入正确的手机号格式</div>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="请输入您的密码" autocomplete="current-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="error-message" id="passwordError">密码不能为空</div>
        </div>
        <div class="form-options">
            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember">记住我</label>
            </div>
            <a href="forgot-password.html" class="forgot-password">忘记密码？</a>
        </div>
        <button type="button" class="btn btn-primary" onclick="handleUserLogin(this)">
            <span class="btn-text">用户登录</span>
            <div class="loading">
                <div class="spinner"></div>
                <span>登录中...</span>
            </div>
        </button>
        <button type="button" class="btn btn-admin" onclick="handleAdminLogin(this)">
            <span class="btn-text">管理员登录</span>
            <div class="loading">
                <div class="spinner"></div>
                <span>登录中...</span>
            </div>
        </button>
    </form>
    <div class="register-link">
        还没有账号？
        <a href="register.html">立即注册</a>
    </div>
</div>
<!-- 引入公共脚本 -->
<script src="common.js"></script>
<!-- 页面独有脚本 -->
<script>
    // 用户登录处理
    function handleUserLogin(btn) {
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();
        const remember = document.getElementById('remember').checked;
        const btnText = btn.querySelector('.btn-text');
        const loading = btn.querySelector('.loading');
        // 清除错误+验证表单
        clearErrors();
        if (!phone) { showError('phone', '请输入手机号'); return; }
        if (!/^1[3-9]\d{9}$/.test(phone)) { showError('phone', '请输入正确的手机号'); return; }
        if (!password) { showError('password', '请输入密码'); return; }
        // 模拟加载
        btn.disabled = true;
        btnText.style.display = 'none';
        loading.classList.add('active');
        // 登录逻辑（匹配LocalStorage用户）
        setTimeout(() => {
            const user = JSON.parse(localStorage.getItem('zhizhitong_user'));
            if (user && user.phone === phone && user.pwd === password) {
                localStorage.setItem('is_login', 'true');
                localStorage.setItem('current_user', phone);
                remember ? localStorage.setItem('remember_user', phone) : localStorage.removeItem('remember_user');
                alert('登录成功！即将跳转到首页');
                window.location.href = 'index.html';
            } else {
                showError('password', '手机号或密码错误');
                btn.disabled = false;
                btnText.style.display = 'block';
                loading.classList.remove('active');
            }
        }, 1000);
    }

    // 管理员登录处理
    function handleAdminLogin(btn) {
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();
        const btnText = btn.querySelector('.btn-text');
        const loading = btn.querySelector('.loading');
        // 清除错误+验证表单
        clearErrors();
        if (!phone) { showError('phone', '请输入管理员账号'); return; }
        if (!password) { showError('password', '请输入管理员密码'); return; }
        // 模拟加载
        btn.disabled = true;
        btnText.style.display = 'none';
        loading.classList.add('active');
        // 管理员登录逻辑（固定账号密码）
        setTimeout(() => {
            if (phone === 'admin' && password === '123456') {
                localStorage.setItem('is_admin', 'true');
                alert('管理员登录成功！');
                window.location.href = 'admin.html';
            } else {
                showError('password', '管理员账号或密码错误');
                btn.disabled = false;
                btnText.style.display = 'block';
                loading.classList.remove('active');
            }
        }, 1000);
    }

    // 页面加载填充记住的手机号
    window.onload = function() {
        const rememberUser = localStorage.getItem('remember_user');
        if (rememberUser) {
            document.getElementById('phone').value = rememberUser;
            document.getElementById('remember').checked = true;
        }
    }
</script>

</body>
</html>
