<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的诉求 - 智治通社区共治平台</title>
    <!-- 引入公共样式 -->
    <link rel="stylesheet" href="common.css">
    <!-- 引入Font Awesome矢量图标 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== 页面独有基础样式 ==================== */
        body {
            padding-top: 80px;
        }
        /* ==================== 页面标题区域 独有样式 ==================== */
        .page-header {
            text-align: center;
            padding: 40px 24px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 100%);
            color: white;
            margin-bottom: 40px;
        }
        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .page-desc {
            font-size: 16px;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }
        /* ==================== 诉求列表容器 独有样式 ==================== */
        .appeal-container {
            max-width: 1000px;
            margin: 0 auto 60px;
            padding: 0 24px;
        }
        /* ==================== 空状态 独有样式 ==================== */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .empty-icon {
            font-size: 72px;
            color: #e5e7eb;
            margin-bottom: 24px;
        }
        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }
        .empty-desc {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 32px;
        }
        /* ==================== 诉求列表 独有样式 ==================== */
        .appeal-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        /* ==================== 诉求项卡片 独有样式 ==================== */
        .appeal-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        .appeal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
        /* 状态边框颜色 */
        .appeal-card.pending { border-left-color: #1a56db; }
        .appeal-card.processing { border-left-color: #f59e0b; }
        .appeal-card.completed { border-left-color: #10b981; }
        /* ==================== 诉求头部 独有样式 ==================== */
        .appeal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .appeal-type {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .appeal-type i {
            color: #1a56db;
        }
        .appeal-status {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-pending {
            background: #eff6ff;
            color: #1a56db;
        }
        .status-processing {
            background: #fffbeb;
            color: #f59e0b;
        }
        .status-completed {
            background: #ecfdf5;
            color: #10b981;
        }
        /* ==================== 诉求内容 独有样式 ==================== */
        .appeal-content {
            margin-bottom: 24px;
        }
        .appeal-desc {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.8;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }
        .appeal-desc.expanded {
            -webkit-line-clamp: unset;
            overflow: visible;
        }
        /* 图片预览 */
        .appeal-images {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .appeal-image-item {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.3s;
        }
        .appeal-image-item:hover {
            transform: scale(1.05);
            border-color: #1a56db;
        }
        .appeal-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* ==================== 诉求底部信息 独有样式 ==================== */
        .appeal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #f3f4f6;
        }
        .appeal-meta {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: #9ca3af;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .appeal-actions {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-view {
            background: #f0f7ff;
            color: #1a56db;
        }
        .btn-view:hover {
            background: #dbeafe;
        }
        .btn-view.hidden {
            display: none;
        }
        /* ==================== 处理结果区域 独有样式 ==================== */
        .appeal-result {
            margin-top: 20px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 16px;
            display: none;
        }
        .appeal-result.show {
            display: block;
        }
        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-title i {
            color: #10b981;
        }
        .result-content {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.6;
        }
        /* ==================== 响应式独有适配 ==================== */
        @media (max-width: 768px) {
            .page-title {
                font-size: 28px;
            }
            .appeal-card {
                padding: 24px;
            }
            .appeal-header {
                flex-direction: column;
                gap: 12px;
            }
            .appeal-type {
                font-size: 16px;
            }
            .appeal-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            .appeal-meta {
                flex-wrap: wrap;
                gap: 16px;
            }
            .appeal-actions {
                width: 100%;
                justify-content: space-between;
            }
            .action-btn {
                flex: 1;
                justify-content: center;
            }
            .appeal-image-item {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

<!-- 页面独有脚本 -->

<script>

    // 权限拦截：管理员禁止访问居民页面
    document.addEventListener('DOMContentLoaded', function() {
        if (adminBanUserPage()) {
            return;
        }
    });

    // 登录状态检查
    let currentUser = '';
    // 全局变量，存储所有诉求数据
    let allUserAppeals = [];

    // 加载用户诉求数据
    function loadUserAppeals() {
        const currentUser = localStorage.getItem('current_user');
        const allAppeals = JSON.parse(localStorage.getItem('zhizhitong_appeals')) || [];
        // 筛选当前用户的诉求
        allUserAppeals = allAppeals.filter(appeal => appeal.phone === currentUser);

        // 默认渲染全部
        renderAppealList('all');
    }

    // 封装成独立的渲染列表函数，筛选时调用
    function renderAppealList(filterStatus = 'all') {
        const emptyState = document.getElementById('emptyState');
        const appealList = document.getElementById('appealList');

        // 按状态筛选
        let filteredList = allUserAppeals;
        if (filterStatus !== 'all') {
            filteredList = allUserAppeals.filter(item => item.status === filterStatus);
        }

        // 无诉求：显示空状态
        if (filteredList.length === 0) {
            emptyState.style.display = 'block';
            appealList.style.display = 'none';
            return;
        }

        // 有诉求：显示列表
        emptyState.style.display = 'none';
        appealList.style.display = 'flex';
        // 按提交时间倒序排列
        filteredList.sort((a, b) => new Date(b.submitTime) - new Date(a.submitTime));

        // 生成诉求卡片
        appealList.innerHTML = '';
        filteredList.forEach((appeal, index) => {
            const appealCard = document.createElement('div');
            // 根据状态设置卡片类名
            let statusClass = '';
            let statusText = '';
            let statusTagClass = '';
            switch(appeal.status) {
                case '待处理':
                    statusClass = 'pending';
                    statusText = '待受理';
                    statusTagClass = 'status-pending';
                    break;
                case '处理中':
                    statusClass = 'processing';
                    statusText = '处理中';
                    statusTagClass = 'status-processing';
                    break;
                case '待核验':
                    statusClass = 'verifying';
                    statusText = '待核验';
                    statusTagClass = 'status-verifying';
                    break;
                case '已完成':
                    statusClass = 'completed';
                    statusText = '已完成';
                    statusTagClass = 'status-completed';
                    break;
                default:
                    statusClass = 'pending';
                    statusText = '待受理';
                    statusTagClass = 'status-pending';
            }
            // 生成图片预览HTML
            let imagesHtml = '';
            if (appeal.images && appeal.images.length > 0) {
                imagesHtml = `<div class="appeal-images">`;
                appeal.images.forEach((img, imgIndex) => {
                    imagesHtml += `
                        <div class="appeal-image-item" onclick="openImageModal('${img}')">
                            <img src="${img}" alt="诉求图片${imgIndex+1}">
                        </div>
                    `;
                });
                imagesHtml += `</div>`;
            }

            // 生成处理结果+办结凭证HTML
            let resultHtml = '';
            if ((appeal.status === '已完成' || appeal.status === '待核验') && (appeal.result || appeal.finishDesc)) {
                // 办结凭证图片HTML
                let finishImagesHtml = '';
                if (appeal.finishImages && appeal.finishImages.length > 0) {
                    finishImagesHtml = `<div class="appeal-images" style="margin-top: 12px;">`;
                    appeal.finishImages.forEach((img, imgIndex) => {
                        finishImagesHtml += `
                <div class="appeal-image-item" onclick="openImageModal('${img}')">
                    <img src="${img}" alt="办结凭证${imgIndex+1}">
                </div>
            `;
                    });
                    finishImagesHtml += `</div>`;
                }

                resultHtml = `
        <div class="appeal-result show">
            <div class="result-title">
                <i class="fa-solid fa-check-circle"></i> 处置结果说明
            </div>
            <div class="result-content">${appeal.finishDesc || appeal.result}</div>
            ${finishImagesHtml}
        </div>
    `;
            }


            // 生成进度条HTML
            let progressHtml = `
    <div class="progress-box" style="margin-top: 12px;">
        <div class="progress-step" style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #6b7280;">
            <span class="${appeal.status === '待处理' ? 'active' : ''}">待受理</span>
            <span class="${['已分配','处理中','待核验','已完成'].includes(appeal.status) ? 'active' : ''}">已分配</span>
            <span class="${['处理中','待核验','已完成'].includes(appeal.status) ? 'active' : ''}">处理中</span>
            <span class="${['待核验','已完成'].includes(appeal.status) ? 'active' : ''}">待核验</span>
            <span class="${appeal.status === '已完成' ? 'active' : ''}">已完成</span>
        </div>
        <div class="progress-bar" style="width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden;">
            <div class="progress-fill" style="height: 100%; background: linear-gradient(90deg, #1a56db 0%, #3b82f6 100%); width: ${getProgressPercent(appeal.status)}; transition: all 0.3s;"></div>
        </div>
    </div>
`;

            // 生成按钮文本（初始默认）
            let btnText = '查看完整';
            // 给每个描述框和按钮加唯一标识（避免冲突）
            const descId = `appealDesc-${index}`;
            const btnId = `appealBtn-${index}`;
            // 诉求卡片HTML
            appealCard.className = `appeal-card ${statusClass}`;
            appealCard.innerHTML = `
                <div class="appeal-header">
                    <div class="appeal-type">
                        <i class="fa-solid fa-tag"></i> ${appeal.type}
                    </div>
                    <div class="appeal-status ${statusTagClass}">
                        ${statusText}
                    </div>
                </div>
                <div class="appeal-content">
                    <div class="appeal-desc" id="${descId}" onclick="toggleDescExpand('${descId}', '${btnId}')">
                        ${appeal.desc}
                    </div>
                    ${imagesHtml}
                </div>
                ${resultHtml}
                ${progressHtml}
                <div class="appeal-footer">
                    <div class="appeal-meta">
                        <div class="meta-item">
                            <i class="fa-solid fa-calendar"></i>
                            <span>提交时间：${appeal.submitTime}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fa-solid fa-id-card"></i>
                            <span>诉求编号：${appeal.code || '无'}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fa-solid fa-id-card"></i>
                            <span>联系方式：${appeal.phone.slice(0,3)}****${appeal.phone.slice(7)}</span>
                        </div>
                    </div>
                    <div class="appeal-actions">
    <button class="action-btn btn-view" id="${btnId}" onclick="toggleDescExpand('${descId}', '${btnId}')">
    <i class="fa-solid fa-eye"></i> ${btnText}
    </button>
    <!-- 待核验状态的核验操作按钮 -->
    ${appeal.status === '待核验' ? `
    <button class="action-btn btn-verify-pass" onclick="handleVerifyPass('${appeal.id}')">
    <i class="fa-solid fa-check"></i> 核验通过
    </button>
    <button class="action-btn btn-verify-reject" onclick="openVerifyModal('${appeal.id}')">
    <i class="fa-solid fa-times"></i> 核验不通过
    </button>
` : ''}
    <!-- 已完成状态的评价按钮 -->
    ${appeal.status === '已完成' && !appeal.score ? `
    <button class="action-btn" style="background: #8b5cf6; color: white;" onclick="openScoreModal('${appeal.id}')">
    <i class="fa-solid fa-star"></i> 去评价
    </button>
    ` : ''}
</div>
                </div>
            `;
            appealList.appendChild(appealCard);
            // 判断内容是否超过2行，不够则隐藏按钮
            setTimeout(() => {
                const descElement = document.getElementById(descId);
                const btnElement = document.getElementById(btnId);
                // 计算2行的高度（行高 × 2）
                const lineHeight = parseFloat(window.getComputedStyle(descElement).lineHeight);
                const twoLineHeight = lineHeight * 2;
                // 若内容高度 ≤ 2行高度，隐藏按钮
                if (descElement.scrollHeight <= twoLineHeight) {
                    btnElement.classList.add('hidden');
                }
            }, 100);
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        // 原来的登录检查逻辑，完全保留
        const isLogin = localStorage.getItem('is_login');
        const currentUser = localStorage.getItem('current_user');
        if (!isLogin || isLogin !== 'true' || !currentUser) {
            alert('请先登录后查看诉求');
            window.location.href = 'login.html';
            return;
        }

        // 绑定筛选按钮点击事件
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // 切换按钮激活样式
                filterBtns.forEach(b => {
                    b.classList.remove('active');
                    b.style.background = 'white';
                    b.style.color = '#1f2937';
                    b.style.borderColor = '#e5e7eb';
                });
                this.classList.add('active');
                this.style.background = '#1a56db';
                this.style.color = 'white';
                this.style.borderColor = '#1a56db';

                // 按选中的状态渲染列表
                const status = this.getAttribute('data-status');
                renderAppealList(status);
            });
        });

        // loadUserAppeals调用
        loadUserAppeals();
    });




    // 展开/收起诉求描述
    function toggleDescExpand(descId, btnId) {
        const descElement = document.getElementById(descId);
        const btnElement = document.getElementById(btnId);
        if (!descElement || !btnElement) return;
        // 切换展开/收起状态
        descElement.classList.toggle('expanded');
        // 切换按钮文本和图标
        if (descElement.classList.contains('expanded')) {
            btnElement.innerHTML = '<i class="fa-solid fa-eye-slash"></i> 收起';
        } else {
            btnElement.innerHTML = '<i class="fa-solid fa-eye"></i> 查看完整';
        }
    }

    // 进度百分比计算函数
    window.getProgressPercent = function(status) {
        const statusMap = {
            "待处理": "20%",
            "已分配": "40%",
            "处理中": "60%",
            "待核验": "80%",
            "已完成": "100%"
        };
        return statusMap[status] || "20%";
    };

    // ========== 核验相关函数 ==========
    // 打开核验驳回弹窗
    function openVerifyModal(appealId) {
        document.getElementById('currentVerifyAppealId').value = appealId;
        document.getElementById('verifyRemark').value = '';
        document.getElementById('verifyModal').classList.add('show');
    }
    // 关闭核验驳回弹窗
    function closeVerifyModal() {
        document.getElementById('verifyModal').classList.remove('show');
    }
    // 核验通过
    function handleVerifyPass(appealId) {
        if (!confirm('确认核验通过？该操作将把诉求状态更新为已完成，完成全流程闭环。')) {
            return;
        }
        const allAppeals = JSON.parse(localStorage.getItem('zhizhitong_appeals')) || [];
        const appealIndex = allAppeals.findIndex(a => String(a.id) === String(appealId));
        if (appealIndex === -1) {
            alert('诉求不存在');
            return;
        }

        const appeal = allAppeals[appealIndex];

        // 更新状态
        appeal.status = '已完成';
        appeal.verifyResult = '通过';
        appeal.verifyTime = new Date().toLocaleString();
        appeal.verifyRemark = '居民核验通过，诉求办结';

        localStorage.setItem('zhizhitong_appeals', JSON.stringify(allAppeals));

        sendNotice('admin', '诉求核验通过', `诉求编号${appeal.code}已被居民核验通过，诉求正式办结。`);
        sendAdminNotice('诉求已核验闭环', `诉求编号：${appeal.code}，居民已完成核验，诉求已办结`, appeal.id);

        alert('核验通过！诉求已正式办结，您可以对本次服务进行评价。');
        loadUserAppeals();
    }
    // 核验不通过（驳回）
    function handleVerifyReject() {
        const appealId = document.getElementById('currentVerifyAppealId').value;
        const verifyRemark = document.getElementById('verifyRemark').value.trim();

        if (!verifyRemark || verifyRemark.length < 5) {
            alert('请填写驳回原因（至少5字）');
            return;
        }

        const allAppeals = JSON.parse(localStorage.getItem('zhizhitong_appeals')) || [];
        const appealIndex = allAppeals.findIndex(a => String(a.id) === String(appealId));

        if (appealIndex === -1) {
            alert('诉求不存在');
            return;
        }

        const appeal = allAppeals[appealIndex];

        // 回退到处理中
        appeal.status = '处理中';
        appeal.verifyResult = '驳回';
        appeal.verifyTime = new Date().toLocaleString();
        appeal.verifyRemark = verifyRemark;

        localStorage.setItem('zhizhitong_appeals', JSON.stringify(allAppeals));

        sendNotice('admin', '诉求被驳回', `诉求编号${appeal.code}被居民驳回，驳回原因：${verifyRemark}，请重新处置。`);

        closeVerifyModal();
        alert('驳回已提交！管理员将重新处置您的诉求，后续进展会及时同步。');
        loadUserAppeals();
    }

    // ========== 星级评价相关函数 ==========
    let currentScore = 0;
    // 设置星级
    function setScore(score) {
        currentScore = score;
        document.getElementById('currentScore').value = score;
        const stars = document.querySelectorAll('#scoreStars i');
        stars.forEach((star, index) => {
            if (index < score) {
                star.style.color = '#f59e0b';
            } else {
                star.style.color = '#d1d5db';
            }
        });
    }
    // 打开评价弹窗
    function openScoreModal(appealId) {
        document.getElementById('currentScoreAppealId').value = appealId;
        document.getElementById('scoreRemark').value = '';
        currentScore = 0;
        setScore(0);
        document.getElementById('scoreModal').classList.add('show');
    }
    // 关闭评价弹窗
    function closeScoreModal() {
        document.getElementById('scoreModal').classList.remove('show');
    }
    // 提交评价
    function handleScoreSubmit() {
        const appealId = document.getElementById('currentScoreAppealId').value;
        const score = document.getElementById('currentScore').value;
        const scoreRemark = document.getElementById('scoreRemark').value.trim();
        if (score == 0) {
            alert('请选择星级评价');
            return;
        }
        const allAppeals = JSON.parse(localStorage.getItem('zhizhitong_appeals')) || [];
        const appealIndex = allAppeals.findIndex(a => String(a.id) === String(appealId));
        if (appealIndex === -1) {
            alert('诉求不存在');
            return;
        }
        // 保存评价
        allAppeals[appealIndex].score = score;
        allAppeals[appealIndex].scoreRemark = scoreRemark;
        // 保存数据
        localStorage.setItem('zhizhitong_appeals', JSON.stringify(allAppeals));
        // 给管理员发送通知
        sendNotice('admin', '收到居民评价', `诉求编号${allAppeals[appealIndex].code}收到居民${score}星评价，评价内容：${scoreRemark || '无'}`);
        // 关闭弹窗+提示+刷新
        closeScoreModal();
        // 给管理员发送评价通知
        const appealScore = allAppeals[appealIndex];
        sendAdminNotice('居民已提交评价', `诉求编号：${appealScore.code}，居民给出了${score}星评价，点击查看详情`, appealScore.id);
        alert('评价提交成功！感谢您的反馈，我们将持续优化服务。');
        loadUserAppeals();
    }


    // 打开驳回弹窗
    let currentRejectAppealId = '';
    function openRejectModal(appealId) {
        currentRejectAppealId = appealId;
        document.getElementById('rejectModal').style.display = 'flex';
    }

    // 关闭驳回弹窗
    function closeRejectModal() {
        document.getElementById('rejectModal').style.display = 'none';
        document.getElementById('rejectReasonInput').value = '';
        currentRejectAppealId = '';
    }

    // 提交驳回申请
    function submitReject() {
        const rejectReason = document.getElementById('rejectReasonInput').value;
        if (!rejectReason || rejectReason.length < 5) {
            alert('请填写核验不通过的原因（至少5个字）');
            return;
        }

        const allAppeals = JSON.parse(localStorage.getItem('zhizhitong_appeals')) || [];
        const appealIndex = allAppeals.findIndex(a => String(a.id) === String(currentRejectAppealId));
        if (appealIndex === -1) {
            alert('诉求不存在，请刷新页面重试');
            return;
        }

        // 更新诉求状态：退回处理中，留痕驳回原因
        allAppeals[appealIndex].status = '处理中';
        allAppeals[appealIndex].rejectReason = rejectReason;
        allAppeals[appealIndex].rejectTime = new Date().toLocaleString();
        allAppeals[appealIndex].verifyResult = '驳回';
        localStorage.setItem('zhizhitong_appeals', JSON.stringify(allAppeals));

        // 给管理员发送驳回通知
        sendAdminNotice('诉求核验被驳回', `诉求编号：${allAppeals[appealIndex].code}，居民核验不通过，驳回原因：${rejectReason}，请重新处置`, currentRejectAppealId);

        alert('已提交驳回申请，工作人员将重新为您处置');
        closeRejectModal();
        loadMyAppeals();
    }

    // 点击弹窗空白处关闭
    document.getElementById('rejectModal').addEventListener('click', function(e) {
        if (e.target === this) closeRejectModal();
    });


</script>

<!-- 动态移动端底部Tab（权限自动切换） -->
<div class="mobile-tab-bar" id="mobileTabBar"></div>
